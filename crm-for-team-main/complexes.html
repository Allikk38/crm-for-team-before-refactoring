<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: complexes.html
    РОЛЬ: Страница управления объектами недвижимости (ЖК)
    СВЯЗИ:
      - CSS: base.css, theme.css, components.css, dashboard.css, modal.css, responsive.css
      - JS: core.js, auth.js, theme.js, layout.js, complexes.js
      - Данные: data/complexes.csv, data/tasks.csv, data/users.csv
    МЕХАНИКА:
      1. Боковая панель с навигацией (можно сворачивать)
      2. Навигация генерируется централизованно из layout.js
      3. Кликабельный профиль в правом верхнем углу
      4. Отображение карточек объектов с фильтрацией и сортировкой
      5. Модальные окна для создания/редактирования объектов
      6. Прогресс-бар выполнения задач по объекту
      7. Поддержка приватных/публичных объектов
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {
                console.warn('Theme initialization error:', e);
            }
        })();
    </script>
    
    <title>Объекты недвижимости - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS модули -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        .complexes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .complexes-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .complexes-filters input,
        .complexes-filters select {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .sort-buttons {
            display: flex;
            gap: 8px;
        }
        
        .sort-btn {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        
        .sort-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .sort-btn:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        
        .my-objects-toggle {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        
        .my-objects-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .complexes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        
        .complex-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .complex-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }
        
        .complex-card-header {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .complex-card-image {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }
        
        .complex-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
        
        .complex-card-info {
            flex: 1;
        }
        
        .complex-card-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .complex-address {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .complex-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-in_progress { background: rgba(255, 193, 68, 0.2); color: #ffc107; }
        .status-archived { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; }
        
        .private-badge {
            display: inline-block;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .public-badge {
            display: inline-block;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .complex-card-body {
            padding: 16px 20px;
        }
        
        .complex-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .complex-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            background: var(--input-bg);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .complex-stat i {
            color: var(--accent);
            font-size: 0.7rem;
        }
        
        .complex-progress {
            margin-top: 12px;
        }
        
        .progress-bar-small {
            height: 4px;
            background: var(--input-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .complex-card-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid var(--card-border);
        }
        
        .complex-btn {
            flex: 1;
            padding: 8px 12px;
            background: rgba(108, 108, 255, 0.15);
            border: none;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .complex-btn:hover {
            background: rgba(108, 108, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .complex-btn-danger {
            background: rgba(255, 107, 107, 0.15);
        }
        
        .complex-btn-danger:hover {
            background: rgba(255, 107, 107, 0.3);
        }
        
        .complex-modal-content {
            max-width: 700px;
        }
        
        .complex-detail-row {
            display: flex;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .complex-detail-label {
            width: 120px;
            font-weight: 600;
            color: var(--accent);
        }
        
        .complex-detail-value {
            flex: 1;
        }
        
        .tasks-list {
            margin-top: 16px;
        }
        
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
        }
        
        .add-complex-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state i {
            font-size: 2rem;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .complexes-grid {
                grid-template-columns: 1fr;
            }
            
            .complex-card-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .complex-card-image {
                width: 100px;
                height: 100px;
            }
        }
        
        .quick-add-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--card-border);
            display: none;
        }
        
        .quick-add-panel.active {
            display: block;
        }
        
        .quick-add-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .quick-add-form input,
        .quick-add-form select {
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
        }
        
        .photo-gallery {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .photo-item {
            width: 80px;
            height: 80px;
            background: var(--input-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-item i {
            font-size: 1.5rem;
            color: var(--text-muted);
        }
        
        .photo-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .photo-item:hover .photo-remove {
            opacity: 1;
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .add-complex-btn-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .add-complex-btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .public-checkbox-wrapper {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .public-checkbox-wrapper label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .help-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель навигации -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            
            <!-- Навигация генерируется централизованно из layout.js -->
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- контейнер для динамической генерации навигации -->
            </nav>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <!-- Кнопка выхода добавляется автоматически из layout.js -->
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="addComplexBtn" class="add-complex-btn-header">
                        <i class="fas fa-plus"></i> Новый объект
                    </button>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <!-- Панель быстрого ввода -->
            <div id="quickAddPanel" class="quick-add-panel">
                <h4><i class="fas fa-bolt"></i> Быстрое добавление объекта</h4>
                <div class="quick-add-form">
                    <input type="text" id="quickTitle" placeholder="Название ЖК">
                    <input type="text" id="quickAddress" placeholder="Адрес">
                    <select id="quickAssignee">
                        <option value="">Ответственный агент</option>
                    </select>
                    <input type="text" id="quickPriceFrom" placeholder="Цена от" style="width: auto;">
                    <input type="text" id="quickPriceTo" placeholder="Цена до" style="width: auto;">
                    <button id="quickSaveBtn" class="add-complex-btn">Сохранить</button>
                </div>
            </div>
            
            <div class="complexes-header">
                <div class="complexes-filters">
                    <input type="text" id="searchInput" placeholder="Поиск по названию или адресу">
                    <select id="statusFilter">
                        <option value="all">Все статусы</option>
                        <option value="active">Активен</option>
                        <option value="in_progress">В работе</option>
                        <option value="archived">Архив</option>
                    </select>
                    <select id="agentFilter">
                        <option value="all">Все агенты</option>
                    </select>
                    <button id="myObjectsToggle" class="my-objects-toggle" title="Показать только мои объекты">
                        <i class="fas fa-user"></i> Мои объекты
                    </button>
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn" data-sort="name"><i class="fas fa-sort-alpha-down"></i> По названию</button>
                    <button class="sort-btn" data-sort="price"><i class="fas fa-sort-amount-down"></i> По цене</button>
                    <button class="sort-btn" data-sort="date"><i class="fas fa-calendar"></i> По дате</button>
                    <button class="sort-btn" data-sort="tasks"><i class="fas fa-tasks"></i> По задачам</button>
                </div>
            </div>
            
            <div id="complexesGrid" class="complexes-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p>Загрузка объектов...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно для объекта -->
    <div id="complexModal" class="modal">
        <div class="modal-content complex-modal-content">
            <h3 id="complexModalTitle"><i class="fas fa-building"></i> Карточка объекта</h3>
            <div id="complexModalBody"></div>
            <div class="modal-buttons">
                <button onclick="closeComplexModal()"><i class="fas fa-times"></i> Закрыть</button>
                <button id="editComplexBtn" class="primary" style="display: none;"><i class="fas fa-edit"></i> Редактировать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для редактирования/создания -->
    <div id="complexFormModal" class="modal">
        <div class="modal-content">
            <h3 id="complexFormTitle"><i class="fas fa-edit"></i> Объект</h3>
            <input type="hidden" id="complexId">
            <input type="text" id="complexTitle" placeholder="Название ЖК" required>
            <input type="text" id="complexAddress" placeholder="Адрес" required>
            <input type="text" id="complexDeveloper" placeholder="Застройщик">
            <div style="display: flex; gap: 12px;">
                <input type="number" id="complexPriceFrom" placeholder="Цена от" style="flex: 1">
                <input type="number" id="complexPriceTo" placeholder="Цена до" style="flex: 1">
            </div>
            <select id="complexStatus">
                <option value="active">Активен</option>
                <option value="in_progress">В работе</option>
                <option value="archived">Архив</option>
            </select>
            <select id="complexAssignee">
                <option value="">Ответственный агент</option>
            </select>
            <input type="text" id="complexCoordinates" placeholder="Координаты (lat,lng) - опционально">
            <textarea id="complexDescription" placeholder="Описание объекта" rows="4"></textarea>
            
            <!-- Чекбокс публичности -->
            <div class="public-checkbox-wrapper">
                <label>
                    <input type="checkbox" id="complexPublic" checked>
                    <i class="fas fa-globe"></i> Публичный объект (виден всем)
                </label>
                <div class="help-text">
                    Приватные объекты видны только назначенному агенту и менеджерам
                </div>
            </div>
            
            <div class="modal-buttons">
                <button onclick="closeComplexFormModal()">Отмена</button>
                <button class="primary" onclick="saveComplex()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="layout.js"></script>
    <script src="complexes.js"></script>
    
    <script>
        // Обновление информации о пользователе
        function updateUserProfile() {
            var user = auth.getCurrentUser();
            if (!user) return;
            
            var userNameSpan = document.getElementById('userName');
            var userRoleSpan = document.getElementById('userRole');
            var userAvatar = document.getElementById('userAvatar');
            
            if (userNameSpan) {
                userNameSpan.textContent = user.name;
            }
            
            if (userRoleSpan) {
                var roleLabel = '';
                if (user.role === 'admin') roleLabel = 'Администратор';
                else if (user.role === 'manager') roleLabel = 'Менеджер';
                else if (user.role === 'agent') roleLabel = 'Агент';
                else roleLabel = 'Наблюдатель';
                userRoleSpan.textContent = roleLabel;
            }
            
            if (userAvatar) {
                var initials = user.name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase();
                userAvatar.innerHTML = initials || '<i class="fas fa-user"></i>';
            }
        }
        
        // Инициализация
        setTimeout(updateUserProfile, 500);
        
        if (window.sidebar) {
            window.sidebar.initSidebar();
        }
    </script>
</body>
</html>
