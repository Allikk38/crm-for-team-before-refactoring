<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- 
    ============================================
    ФАЙЛ: counterparties.html
    РОЛЬ: Управление контрагентами (продавцы, покупатели, застройщики, инвесторы)
    СВЯЗИ:
      - CSS: base.css, theme.css, components.css, modal.css, responsive.css
      - JS: core.js, auth.js, theme.js, layout.js, counterparties.js
      - Данные: data/counterparties.csv, data/deals.csv
    МЕХАНИКА:
      1. Боковая панель с навигацией (генерируется централизованно из layout.js)
      2. Кликабельный профиль в правом верхнем углу
      3. Список контрагентов с фильтрацией по типу и поиском
      4. Карточка контрагента с информацией и связанными сделками
      5. CRUD операции с контрагентами
      6. Фильтрация по роли (админ/менеджер видят всех, агент — только своих)
      7. Экспорт контактов
    ============================================
    -->
    
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('crm_theme');
                if (savedTheme === 'light') {
                    if (document.documentElement) document.documentElement.classList.add('theme-light');
                    if (document.body) document.body.classList.add('theme-light');
                } else if (savedTheme === 'dark') {
                    if (document.documentElement) document.documentElement.classList.add('theme-dark');
                    if (document.body) document.body.classList.add('theme-dark');
                }
            } catch(e) {
                console.warn('Theme initialization error:', e);
            }
        })();
    </script>
    
    <title>Контрагенты - CRM для команды</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        /* Стили для страницы контрагентов */
        .counterparties-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .counterparties-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .counterparties-filters input,
        .counterparties-filters select {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .add-counterparty-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .add-counterparty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 108, 255, 0.4);
        }
        
        .export-btn-sm {
            background: rgba(108, 108, 255, 0.15);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .export-btn-sm:hover {
            background: rgba(108, 108, 255, 0.3);
        }
        
        /* Сетка контрагентов */
        .counterparties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        
        .counterparty-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .counterparty-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }
        
        .counterparty-card-header {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .counterparty-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }
        
        .counterparty-info {
            flex: 1;
        }
        
        .counterparty-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .counterparty-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
        }
        
        .type-seller { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .type-buyer { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .type-developer { background: rgba(156, 39, 176, 0.2); color: #9c27b0; }
        .type-investor { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        
        .counterparty-contacts {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .counterparty-contacts span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .counterparty-card-body {
            padding: 16px 20px;
        }
        
        .counterparty-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .counterparty-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            background: var(--input-bg);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .counterparty-stat i {
            color: var(--accent);
        }
        
        .counterparty-notes {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--card-border);
        }
        
        .counterparty-card-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid var(--card-border);
        }
        
        .counterparty-btn {
            flex: 1;
            padding: 8px 12px;
            background: rgba(108, 108, 255, 0.15);
            border: none;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .counterparty-btn:hover {
            background: rgba(108, 108, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        .loading-state i {
            font-size: 2rem;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Модальное окно контрагента */
        .counterparty-modal-content {
            max-width: 600px;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .deals-list {
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .deal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.8rem;
        }
        
        .deal-status {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 12px;
        }
        
        @media (max-width: 768px) {
            .counterparties-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
            
            .counterparty-card-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
        
        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Боковая панель навигации -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-chart-line"></i>
                <span>CRM Team</span>
            </div>
            
            <!-- Навигация генерируется централизованно из layout.js -->
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- контейнер для динамической генерации навигации -->
            </nav>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" onclick="window.sidebar?.toggleSidebar()">
                    <i class="fas fa-chevron-left"></i>
                    <span>Свернуть</span>
                </button>
                <!-- Кнопка выхода добавляется автоматически из layout.js -->
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <div class="top-bar">
                <div class="top-bar-actions">
                    <button id="addCounterpartyBtn" class="add-counterparty-btn">
                        <i class="fas fa-plus"></i> Новый контрагент
                    </button>
                    <button id="exportBtn" class="export-btn-sm" onclick="exportCounterparties()">
                        <i class="fas fa-download"></i> Экспорт
                    </button>
                </div>
                <div class="user-profile" onclick="window.sidebar?.goToProfile()">
                    <div class="user-info">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-role" id="userRole">—</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="counterparties-header">
                <div class="counterparties-filters">
                    <input type="text" id="searchInput" placeholder="Поиск по имени, телефону, email">
                    <select id="typeFilter">
                        <option value="all">Все типы</option>
                        <option value="seller">Продавцы</option>
                        <option value="buyer">Покупатели</option>
                        <option value="developer">Застройщики</option>
                        <option value="investor">Инвесторы</option>
                    </select>
                    <select id="personTypeFilter">
                        <option value="all">Все</option>
                        <option value="individual">Физ. лица</option>
                        <option value="legal">Юр. лица</option>
                    </select>
                </div>
            </div>
            
            <div id="counterpartiesGrid" class="counterparties-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p>Загрузка контрагентов...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно создания/редактирования контрагента -->
    <div id="counterpartyModal" class="modal">
        <div class="modal-content counterparty-modal-content">
            <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Контрагент</h3>
            <input type="hidden" id="counterpartyId">
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-tag"></i> Тип</label>
                    <select id="counterpartyType" required>
                        <option value="seller">Продавец/Собственник</option>
                        <option value="buyer">Покупатель</option>
                        <option value="developer">Застройщик</option>
                        <option value="investor">Инвестор</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-building"></i> Тип лица</label>
                    <select id="counterpartyPersonType">
                        <option value="individual">Физическое лицо</option>
                        <option value="legal">Юридическое лицо</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Имя / Название</label>
                    <input type="text" id="counterpartyName" placeholder="Иванов Иван / ООО СтройИнвест" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Телефон</label>
                    <input type="tel" id="counterpartyPhone" placeholder="+7 999 123-45-67">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="counterpartyEmail" placeholder="ivan@mail.ru">
                </div>
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label><i class="fab fa-telegram"></i> Telegram</label>
                    <input type="text" id="counterpartyTelegram" placeholder="@ivan">
                </div>
                <div class="input-group">
                    <label><i class="fab fa-whatsapp"></i> WhatsApp</label>
                    <input type="text" id="counterpartyWhatsapp" placeholder="+7 999 123-45-67">
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-sticky-note"></i> Примечания</label>
                <textarea id="counterpartyNotes" rows="3" placeholder="Особенности, пожелания, история..."></textarea>
            </div>
            
            <!-- Связанные сделки (только при просмотре) -->
            <div id="relatedDealsSection" style="display: none;">
                <div class="profile-section-title" style="margin-top: 16px;">
                    <i class="fas fa-handshake"></i> Связанные сделки
                </div>
                <div id="relatedDealsList" class="deals-list"></div>
            </div>
            
            <div class="modal-buttons">
                <button onclick="closeCounterpartyFormModal()"><i class="fas fa-times"></i> Отмена</button>
                <button class="primary" onclick="saveCounterparty()"><i class="fas fa-save"></i> Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="core.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="layout.js"></script>
    <script src="counterparties.js"></script>
    
    <script>
        // Обновление информации о пользователе
        function updateUserProfile() {
            var user = auth.getCurrentUser();
            if (!user) return;
            
            var userNameSpan = document.getElementById('userName');
            var userRoleSpan = document.getElementById('userRole');
            var userAvatar = document.getElementById('userAvatar');
            
            if (userNameSpan) userNameSpan.textContent = user.name;
            if (userRoleSpan) {
                var roleLabel = '';
                if (user.role === 'admin') roleLabel = 'Администратор';
                else if (user.role === 'manager') roleLabel = 'Менеджер';
                else if (user.role === 'agent') roleLabel = 'Агент';
                else roleLabel = 'Наблюдатель';
                userRoleSpan.textContent = roleLabel;
            }
            if (userAvatar) {
                var initials = user.name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase();
                userAvatar.innerHTML = initials || '<i class="fas fa-user"></i>';
            }
        }
        
        setTimeout(updateUserProfile, 500);
        
        if (window.sidebar) window.sidebar.initSidebar();
    </script>
</body>
</html>
